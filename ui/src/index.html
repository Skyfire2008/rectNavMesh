<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Rectangular nav mesh UI</title>
	<link rel="stylesheet" type="text/css" href="main.css" />
	<script src="index.js"></script>
</head>

<body>
	<div class="column">
		<div class="row">
			<select id="generatorSelect"></select>
			<div>
				<label for="widthInput">Width:</label>
				<input type="number" step="1" min="0" id="widthInput" />
			</div>
			<div>
				<label for="heightInput">Height:</label>
				<input type="number" step="1" min="0" id="heightInput" />
			</div>
			<button id="generateButton">Generate!</button>
		</div>
		<canvas id="mainCanvas" width="1280" height="720" />
	</div>
</body>

</html>
